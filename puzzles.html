<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle Academy - HyperGrid Chess</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: #0a0a14;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      padding: 1.5rem;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .page-title {
      font-family: 'Orbitron', 'Segoe UI', sans-serif;
      font-size: 2rem;
      color: #e94560;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
      letter-spacing: 3px;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .page-subtitle {
      font-size: 0.9rem;
      color: #888;
      letter-spacing: 2px;
      margin-bottom: 1.5rem;
    }

    .rival-banner {
      width: 100%;
      max-width: 600px;
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 1px solid rgba(233, 69, 96, 0.4);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 2rem;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.1);
    }

    .rival-avatar {
      width: 64px;
      height: 80px;
      border-radius: 8px;
      border: 2px solid rgba(233, 69, 96, 0.6);
      object-fit: cover;
      background: linear-gradient(145deg, #0f3460, #533483);
      flex-shrink: 0;
    }

    .rival-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rival-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      color: #e94560;
      letter-spacing: 2px;
    }

    .rival-title {
      font-size: 0.75rem;
      color: #f9ca24;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .rival-quote {
      font-size: 0.85rem;
      color: #aaa;
      font-style: italic;
      line-height: 1.4;
    }

    .tier-section {
      width: 100%;
      max-width: 600px;
      margin-bottom: 2rem;
    }

    .tier-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .tier-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .tier-name.easy { color: #4ecdc4; }
    .tier-name.medium { color: #f9ca24; }
    .tier-name.hard { color: #e94560; }

    .tier-progress {
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 1px;
    }

    .tier-description {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .tier-locked-msg {
      font-size: 0.85rem;
      color: #555;
      text-align: center;
      padding: 24px;
      border: 1px dashed #333;
      border-radius: 10px;
      letter-spacing: 1px;
    }

    .puzzle-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }

    .puzzle-node {
      aspect-ratio: 1;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      text-decoration: none;
      border: 2px solid transparent;
    }

    .puzzle-node.unlocked {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .puzzle-node.unlocked:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    .puzzle-node.unlocked.easy:hover { border-color: rgba(78, 205, 196, 0.6); box-shadow: 0 6px 20px rgba(78, 205, 196, 0.15); }
    .puzzle-node.unlocked.medium:hover { border-color: rgba(249, 202, 36, 0.6); box-shadow: 0 6px 20px rgba(249, 202, 36, 0.15); }
    .puzzle-node.unlocked.hard:hover { border-color: rgba(233, 69, 96, 0.6); box-shadow: 0 6px 20px rgba(233, 69, 96, 0.15); }

    .puzzle-node.solved {
      border-color: rgba(78, 205, 196, 0.5);
      background: linear-gradient(145deg, #0f3460, #16213e);
    }

    .puzzle-node.solved .node-number {
      color: #4ecdc4;
    }

    .puzzle-node.solved::after {
      content: '\2713';
      position: absolute;
      top: 4px;
      right: 6px;
      font-size: 0.7rem;
      color: #4ecdc4;
    }

    .puzzle-node.locked {
      background: rgba(30, 30, 40, 0.5);
      border-color: rgba(50, 50, 60, 0.3);
      cursor: not-allowed;
    }

    .puzzle-node.locked .node-number {
      color: #444;
    }

    .puzzle-node.locked::after {
      content: '\1F512';
      position: absolute;
      top: 4px;
      right: 6px;
      font-size: 0.7rem;
      color: #555;
    }

    .node-number {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #ccc;
    }

    .node-label {
      font-size: 0.55rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
      text-align: center;
      line-height: 1.2;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .trial-section {
      width: 100%;
      max-width: 600px;
      margin-top: 0.5rem;
      margin-bottom: 2rem;
    }

    .trial-node {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 24px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .trial-node.locked {
      background: rgba(30, 30, 40, 0.5);
      border: 2px solid rgba(50, 50, 60, 0.3);
      cursor: not-allowed;
    }

    .trial-node.unlocked {
      background: linear-gradient(145deg, #2a0a0a, #1a1a2e);
      border: 2px solid rgba(233, 69, 96, 0.6);
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.2);
      animation: trialPulse 2s ease-in-out infinite;
    }

    .trial-node.unlocked:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.4);
    }

    @keyframes trialPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(233, 69, 96, 0.2); }
      50% { box-shadow: 0 0 35px rgba(233, 69, 96, 0.4); }
    }

    .trial-icon {
      font-size: 2.5rem;
      flex-shrink: 0;
    }

    .trial-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .trial-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    .trial-desc {
      font-size: 0.8rem;
      color: #aaa;
      line-height: 1.3;
    }

    .trial-locked-text {
      font-size: 0.8rem;
      color: #555;
    }

    .trial-requirement {
      font-size: 0.75rem;
      color: #666;
      margin-top: 2px;
    }

    .back-btn {
      display: inline-block;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      background: linear-gradient(135deg, rgba(15, 52, 96, 0.8), rgba(26, 26, 46, 0.9));
      color: white;
      border: 2px solid rgba(233, 69, 96, 0.4);
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 1rem;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      border-color: rgba(233, 69, 96, 0.8);
      transform: translateY(-2px);
    }

    .overall-progress {
      width: 100%;
      max-width: 600px;
      margin-bottom: 2rem;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #4ecdc4, #f9ca24, #e94560);
      transition: width 0.5s ease;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="page-title">Puzzle Academy</div>
  <div class="page-subtitle">Train. Improve. Conquer.</div>

  <div class="rival-banner">
    <img src="images/coach.jpg" alt="SPECTRE" class="rival-avatar" id="rivalAvatar">
    <div class="rival-avatar" style="display:none; align-items:center; justify-content:center; font-size:1.8rem; color:rgba(255,255,255,0.3);">&#9818;</div>
    <div class="rival-info">
      <span class="rival-name">SPECTRE</span>
      <span class="rival-title">Puzzle Master &bull; ~1800 ELO</span>
      <span class="rival-quote" id="rivalQuote">Solve my puzzles... if you can.</span>
    </div>
  </div>

  <div class="overall-progress">
    <div class="progress-text">
      <span>Overall Progress</span>
      <span id="progressCount">0 / 30</span>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%;"></div>
    </div>
  </div>

  <div id="puzzleMap"></div>

  <a href="index.html" class="back-btn">&larr; Menu</a>

  <script>
    (function() {
      var rivalImg = document.getElementById('rivalAvatar');
      if (rivalImg) {
        rivalImg.onerror = function() {
          this.style.display = 'none';
          this.nextElementSibling.style.display = 'flex';
        };
      }
      var solved = (function() { try { return JSON.parse(localStorage.getItem('hypergrid_solved') || '[]'); } catch(e) { return []; } })();

      fetch('data/puzzles.json')
        .then(function(r) { if (!r.ok) throw new Error('Failed to load'); return r.json(); })
        .then(function(data) {
          var tiers = data.tiers;
          var trial = data.trial;
          var totalPuzzles = 0;
          for (var t = 0; t < tiers.length; t++) {
            totalPuzzles += tiers[t].puzzles.length;
          }

          var solvedCount = solved.length;
          document.getElementById('progressCount').textContent = solvedCount + ' / ' + totalPuzzles;
          document.getElementById('progressBar').style.width = ((solvedCount / totalPuzzles) * 100) + '%';

          var mapEl = document.getElementById('puzzleMap');
          var prevTierSolved = true;
          var puzzleGlobalIndex = 0;

          for (var t = 0; t < tiers.length; t++) {
            var tier = tiers[t];
            var tierSolvedCount = 0;
            for (var p = 0; p < tier.puzzles.length; p++) {
              if (solved.indexOf(tier.puzzles[p].id) !== -1) {
                tierSolvedCount++;
              }
            }
            var allTierSolved = tierSolvedCount === tier.puzzles.length;

            var section = document.createElement('div');
            section.className = 'tier-section';

            var header = document.createElement('div');
            header.className = 'tier-header';
            var nameSpan = document.createElement('span');
            nameSpan.className = 'tier-name ' + tier.id;
            nameSpan.textContent = tier.name;
            var progressSpan = document.createElement('span');
            progressSpan.className = 'tier-progress';
            progressSpan.textContent = tierSolvedCount + ' / ' + tier.puzzles.length;
            header.appendChild(nameSpan);
            header.appendChild(progressSpan);

            var desc = document.createElement('div');
            desc.className = 'tier-description';
            desc.textContent = tier.description;

            section.appendChild(header);
            section.appendChild(desc);

            if (!prevTierSolved) {
              var lockedMsg = document.createElement('div');
              lockedMsg.className = 'tier-locked-msg';
              lockedMsg.textContent = 'Complete the previous tier to unlock';
              section.appendChild(lockedMsg);
            } else {
              var grid = document.createElement('div');
              grid.className = 'puzzle-grid';

              for (var p = 0; p < tier.puzzles.length; p++) {
                var puzzle = tier.puzzles[p];
                var isSolved = solved.indexOf(puzzle.id) !== -1;

                var isUnlocked = true;
                if (p > 0) {
                  isUnlocked = solved.indexOf(tier.puzzles[p - 1].id) !== -1;
                } else if (t > 0) {
                  var prevTier = tiers[t - 1];
                  var prevAllSolved = true;
                  for (var pp = 0; pp < prevTier.puzzles.length; pp++) {
                    if (solved.indexOf(prevTier.puzzles[pp].id) === -1) {
                      prevAllSolved = false;
                      break;
                    }
                  }
                  isUnlocked = prevAllSolved;
                }

                var node = document.createElement('a');
                node.className = 'puzzle-node ' + tier.id;
                if (isSolved) {
                  node.className += ' solved';
                } else if (isUnlocked) {
                  node.className += ' unlocked';
                } else {
                  node.className += ' locked';
                }

                if (isUnlocked) {
                  node.href = 'chess.html?mode=puzzle&puzzle=' + puzzle.id;
                } else {
                  node.href = '#';
                  node.setAttribute('tabindex', '-1');
                  node.setAttribute('aria-disabled', 'true');
                  node.addEventListener('click', function(e) { e.preventDefault(); });
                }

                var numSpan = document.createElement('span');
                numSpan.className = 'node-number';
                numSpan.textContent = (p + 1);

                var labelSpan = document.createElement('span');
                labelSpan.className = 'node-label';
                labelSpan.textContent = puzzle.description.split('—')[0].trim();

                node.appendChild(numSpan);
                node.appendChild(labelSpan);
                grid.appendChild(node);
                puzzleGlobalIndex++;
              }
              section.appendChild(grid);
            }

            mapEl.appendChild(section);
            prevTierSolved = allTierSolved;
          }

          var trialSection = document.createElement('div');
          trialSection.className = 'trial-section';

          var trialNode = document.createElement('a');
          var trialUnlocked = solvedCount >= totalPuzzles;

          if (trialUnlocked) {
            trialNode.className = 'trial-node unlocked';
            trialNode.href = 'chess.html?mode=trial';
          } else {
            trialNode.className = 'trial-node locked';
            trialNode.href = '#';
            trialNode.setAttribute('tabindex', '-1');
            trialNode.setAttribute('aria-disabled', 'true');
            trialNode.addEventListener('click', function(e) { e.preventDefault(); });
          }

          var trialIcon = document.createElement('span');
          trialIcon.className = 'trial-icon';
          trialIcon.textContent = '\u265A';

          var trialInfo = document.createElement('div');
          trialInfo.className = 'trial-info';

          var trialName = document.createElement('div');
          trialName.className = 'trial-name';
          trialName.textContent = trial.name;

          if (trialUnlocked) {
            var trialDesc = document.createElement('div');
            trialDesc.className = 'trial-desc';
            trialDesc.textContent = trial.rival_taunt;
            trialInfo.appendChild(trialName);
            trialInfo.appendChild(trialDesc);
          } else {
            var trialLocked = document.createElement('div');
            trialLocked.className = 'trial-locked-text';
            trialLocked.textContent = 'Defeat SPECTRE in a full game';
            var trialReq = document.createElement('div');
            trialReq.className = 'trial-requirement';
            trialReq.textContent = 'Solve all ' + totalPuzzles + ' puzzles to unlock';
            trialInfo.appendChild(trialName);
            trialInfo.appendChild(trialLocked);
            trialInfo.appendChild(trialReq);
          }

          trialNode.appendChild(trialIcon);
          trialNode.appendChild(trialInfo);
          trialSection.appendChild(trialNode);
          mapEl.appendChild(trialSection);

          var quotes = [
            "Solve my puzzles... if you can.",
            "You'll never unlock the trial.",
            "Every puzzle is a lesson in failure.",
            "Come back when you've actually learned something.",
            "I've been waiting. Take your time — you'll need it."
          ];
          var quoteEl = document.getElementById('rivalQuote');
          if (solvedCount === 0) {
            quoteEl.textContent = quotes[0];
          } else if (solvedCount < 10) {
            quoteEl.textContent = quotes[Math.floor(Math.random() * 2) + 1];
          } else if (solvedCount < 20) {
            quoteEl.textContent = "You're persistent. I'll give you that.";
          } else if (solvedCount < 30) {
            quoteEl.textContent = "So close... but close doesn't count in chess.";
          } else {
            quoteEl.textContent = "So you think you're ready? Come face me.";
          }
        })
        .catch(function(err) {
          console.error('Failed to load puzzles:', err);
          var mapEl = document.getElementById('puzzleMap');
          if (mapEl) mapEl.innerHTML = '<p style="text-align:center;color:#e94560;padding:20px;">Failed to load puzzles. Please refresh.</p>';
        });
    })();
  </script>
</body>
</html>
