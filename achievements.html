<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Achievement - HyperGrid Chess</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: #0a0a14;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      padding: 2rem;
      padding-top: 3rem;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
    }

    #cyberCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.5) 100%);
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: vignetteFadeIn 1s ease 3s forwards;
    }

    @keyframes vignetteFadeIn {
      to { opacity: 1; }
    }

    h1 {
      color: #e94560;
      font-size: 2.5rem;
      margin-bottom: 2rem;
      text-shadow: 0 0 30px rgba(233, 69, 96, 0.6), 0 0 60px rgba(233, 69, 96, 0.3);
      letter-spacing: 4px;
      position: relative;
      z-index: 1;
      text-align: center;
      opacity: 0;
      animation: titleEntry 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.5s forwards,
                 titleGlow 3s ease-in-out 2.7s infinite alternate;
    }

    @keyframes titleEntry {
      0% {
        opacity: 0;
        transform: translateY(-40px) scale(0.8);
        text-shadow: 0 0 80px rgba(233, 69, 96, 1), 0 0 160px rgba(233, 69, 96, 0.8), 0 0 240px rgba(233, 69, 96, 0.5);
        letter-spacing: 20px;
      }
      60% {
        opacity: 1;
        transform: translateY(5px) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        letter-spacing: 4px;
        text-shadow: 0 0 30px rgba(233, 69, 96, 0.6), 0 0 60px rgba(233, 69, 96, 0.3);
      }
    }

    @keyframes titleGlow {
      0% { text-shadow: 0 0 30px rgba(233, 69, 96, 0.6), 0 0 60px rgba(233, 69, 96, 0.3); }
      100% { text-shadow: 0 0 40px rgba(233, 69, 96, 0.8), 0 0 80px rgba(233, 69, 96, 0.5), 0 0 100px rgba(233, 69, 96, 0.2); }
    }

    .content-container {
      max-width: 650px;
      width: 100%;
      background: linear-gradient(145deg, rgba(26, 26, 46, 0.9), rgba(22, 33, 62, 0.9));
      border-radius: 15px;
      padding: 2.5rem;
      line-height: 1.8;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 215, 0, 0.3);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.1), 0 8px 32px rgba(0, 0, 0, 0.4);
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.8s ease 2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .content-container h2 {
      color: rgba(255, 215, 0, 0.9);
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .content-container p {
      margin-bottom: 1rem;
      font-size: 1rem;
      color: #ccc;
    }

    .placeholder-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
    }

    .back-btn {
      margin-top: 2rem;
      margin-bottom: 2rem;
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(0, 255, 255, 0.05));
      color: rgba(0, 255, 255, 0.9);
      border: 1px solid rgba(0, 255, 255, 0.4);
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: fadeIn 0.8s ease 2.5s forwards;
    }

    .back-btn:hover {
      transform: translateY(-3px);
      background: rgba(0, 255, 255, 0.15);
      border-color: rgba(0, 255, 255, 0.8);
      box-shadow: 0 6px 25px rgba(0, 255, 255, 0.3);
      color: #fff;
    }
  </style>
</head>
<body>
  <canvas id="cyberCanvas"></canvas>

  <h1>PLAYER ACHIEVEMENT</h1>

  <div class="content-container">
    <span class="placeholder-icon">🏆</span>
    <h2>Achievements</h2>
    <p>This page is under construction. Check back soon to track your chess achievements and milestones!</p>
  </div>

  <a href="about.html" class="back-btn">← Back to Explore</a>

  <script>window.HYPERGRID_SKIP_INTRO = true;</script>
  <script src="background.js"></script>
</body>
</html>
