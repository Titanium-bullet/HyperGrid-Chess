<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPERGRID CHESS</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
  body {
    background: linear-gradient(135deg, #0c0c0c, #1a1a2e) !important;
    position: relative;
    overflow-x: hidden;
  }

  .game-container, h1, .controls-top, .controls-bottom, #status,
  .puzzle-bar, .puzzle-buttons, .ai-thinking, .opening-name {
    position: relative;
    z-index: 1;
  }

  .modal-overlay {
    z-index: 1000;
  }
</style>
</head>
<body>
<h1>HYPERGRID CHESS <span class="chess-icon">&#9823;</span></h1>

<div class="game-container">
  <div class="side-panel left-panel">
    <div class="ai-profile" id="aiProfileSection">
      <div class="ai-profile-img-wrap">
        <img id="aiProfileImg" src="images/ai-profile.png" alt="AI" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="ai-profile-placeholder" style="display:none;">&#9818;</div>
      </div>
      <div class="ai-profile-info">
        <span class="ai-profile-name" id="aiProfileName">Beginner</span>
        <span class="ai-profile-elo" id="aiProfileElo">~500 ELO</span>
      </div>
    </div>
    <div class="captured-section" id="leftCaptured">
      <h3>White Captured <span id="materialWhite" class="material-advantage"></span></h3>
      <div id="capturedWhite" class="captured-pieces"></div>
    </div>
    <div class="captured-section" id="blackCapturedSection">
      <h3>Black Captured <span id="materialBlack" class="material-advantage"></span></h3>
      <div id="capturedBlack" class="captured-pieces"></div>
    </div>
  </div>

  <div class="center-section">
    <div class="controls-top">
      <div class="control-group" id="difficultyGroup">
        <label>Difficulty:</label>
        <select id="aiDifficulty" onchange="changeDifficulty()">
          <option value="1" selected>Beginner (~500)</option>
          <option value="2">Club (~1500)</option>
          <option value="3">Master (~2500)</option>
        </select>
      </div>
      <div class="control-group" id="timeControlGroup">
        <label>Time:</label>
        <select id="timeControl" onchange="changeTimeControl()">
          <option value="0" selected>Unlimited</option>
          <option value="180">Blitz 3+0</option>
          <option value="600">Rapid 10+0</option>
          <option value="1800">Classical 30+0</option>
        </select>
      </div>
      <div class="control-group">
        <button onclick="showSettingsModal()" class="icon-btn" title="Settings">&#9881;</button>
      </div>
    </div>

    <div id="puzzleBar" class="puzzle-bar" style="display:none;">
      <div class="puzzle-info">
        <span id="puzzleDescription" class="puzzle-description"></span>
        <div class="puzzle-meta">
          <span id="puzzleDifficulty" class="puzzle-difficulty"></span>
          <span id="puzzleMoves" class="puzzle-moves-count"></span>
          <span id="puzzleStatus" class="puzzle-status-badge"></span>
        </div>
      </div>
      <div id="puzzleHint" class="puzzle-hint"></div>
    </div>

    <div id="myBoard"></div>
    <div id="aiThinking" class="ai-thinking" style="display:none;">
      <span class="thinking-icon">&#9881;</span>
      AI is thinking<span class="thinking-dots">...</span>
    </div>

    <div id="openingName" class="opening-name"></div>

    <div id="status"></div>

    <div class="controls-bottom">
      <button onclick="location.href='index.html'">&#8592; Menu</button>
      <button onclick="resetGame()">New Game</button>
      <button onclick="undoMove()">Undo</button>
      <button id="flipBtn" onclick="handleFlipOrSwitch()">Play as Black</button>
    </div>

    <div id="puzzleButtons" class="puzzle-buttons" style="display:none;">
      <button onclick="location.href='index.html'">&#8592; Menu</button>
      <button onclick="resetPuzzle()">Retry</button>
      <button onclick="showPuzzleHint()">Hint</button>
      <button onclick="nextPuzzle()">Next Puzzle</button>
      <span class="puzzle-solved-count">Solved: <span id="puzzlesSolvedCount">0</span></span>
    </div>
  </div>

  <div class="side-panel right-panel">
    <div class="timer-section">
      <div class="timer white-timer" id="whiteTimer">
        <span class="timer-label">WHITE</span>
        <span class="timer-display">10:00</span>
      </div>
    </div>
    <div class="timer-section">
      <div class="timer black-timer" id="blackTimer">
        <span class="timer-label">BLACK</span>
        <span class="timer-display">10:00</span>
      </div>
    </div>
    <div class="move-history-section">
      <h3>Move History</h3>
      <div id="moveHistory" class="move-history"></div>
    </div>
  </div>
</div>

<div id="gameOverModal" class="modal-overlay">
  <div class="modal-content game-over-content">
    <h2 id="gameOverTitle">Game Over</h2>
    <p id="gameOverMessage"></p>
    <div id="gameOverStats"></div>
    <div class="game-over-buttons">
      <button onclick="resetGame(); hideGameOverModal();">New Game</button>
      <button onclick="hideGameOverModal()">Close</button>
    </div>
  </div>
</div>

<div id="settingsModal" class="modal-overlay">
  <div class="modal-content settings-content">
    <h2>Settings</h2>
    <div class="settings-group">
      <label>Theme</label>
      <select id="themeSelect" onchange="changeBoardTheme()">
        <option value="theme-cyber" selected>Cyber</option>
        <option value="theme-dark">Dark</option>
      </select>
    </div>
    <div class="settings-group">
      <label>Sound</label>
      <button id="soundToggle" onclick="toggleSound()" class="icon-btn">&#128266;</button>
    </div>
    <button onclick="hideSettingsModal()" class="btn-close-settings">Close</button>
  </div>
</div>

<div id="promotionModal" class="modal-overlay">
  <div class="modal-content">
    <h2>Select Promotion</h2>
    <div id="promoPieces"></div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
