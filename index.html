<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperGrid Chess</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 25%, #0a1628 50%, #0d1a2e 75%, #1a0a1a 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
      pointer-events: none;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      color: #e94560;
      font-size: 3.5rem;
      margin-bottom: 3rem;
      text-shadow: 0 0 30px rgba(233, 69, 96, 0.6), 0 0 60px rgba(233, 69, 96, 0.3);
      letter-spacing: 4px;
      position: relative;
      z-index: 1;
      animation: titleGlow 3s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      0% { text-shadow: 0 0 30px rgba(233, 69, 96, 0.6), 0 0 60px rgba(233, 69, 96, 0.3); }
      100% { text-shadow: 0 0 40px rgba(233, 69, 96, 0.8), 0 0 80px rgba(233, 69, 96, 0.5), 0 0 100px rgba(233, 69, 96, 0.2); }
    }

    .menu-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      max-width: 320px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .menu-btn {
      padding: 1.2rem 2rem;
      font-size: 1.3rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-decoration: none;
      display: inline-block;
    }

    .menu-btn.primary {
      background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    .menu-btn.primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(233, 69, 96, 0.6);
    }

    .menu-btn.secondary {
      background: linear-gradient(135deg, rgba(15, 52, 96, 0.8) 0%, rgba(26, 26, 46, 0.9) 100%);
      color: white;
      border: 2px solid rgba(233, 69, 96, 0.6);
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.2);
    }

    .menu-btn.secondary:hover {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.9) 0%, rgba(15, 52, 96, 0.8) 100%);
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(233, 69, 96, 0.4);
    }

    .menu-btn.disabled {
      background: rgba(42, 42, 62, 0.6);
      color: #666;
      border: 2px solid #444;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .menu-btn.disabled:hover {
      transform: none;
      box-shadow: none;
    }

    .menu-btn .subtitle {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 4px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>HYPERGRID CHESS</h1>
  
  <div class="menu-container">
    <a href="chess.html?mode=ai" class="menu-btn primary">
      Chess
      <span class="subtitle">vs AI</span>
    </a>
    
    <a href="chess.html?mode=pvp" class="menu-btn secondary">
      Two Player
      <span class="subtitle">Local multiplayer</span>
    </a>
    
    <div class="menu-btn disabled">
      Checkers
      <span class="subtitle">Coming soon</span>
    </div>
    
    <a href="about.html" class="menu-btn secondary">
      About
      <span class="subtitle">Learn more</span>
    </a>
  </div>
</body>
</html>
