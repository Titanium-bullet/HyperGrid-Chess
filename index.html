<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperGrid Chess</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a14;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      position: relative;
      overflow: hidden;
    }

    #cyberCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.5) 100%);
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: vignetteFadeIn 1s ease 3s forwards;
    }

    @keyframes vignetteFadeIn {
      to { opacity: 1; }
    }

    h1 {
      color: #e94560;
      font-size: 3.5rem;
      margin-bottom: 3rem;
      text-shadow: 0 0 30px rgba(233, 69, 96, 0.6), 0 0 60px rgba(233, 69, 96, 0.3);
      letter-spacing: 4px;
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: titleEntry 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.5s forwards,
                 titleGlow 3s ease-in-out 2.7s infinite alternate;
    }

    @keyframes titleEntry {
      0% {
        opacity: 0;
        transform: translateY(-40px) scale(0.8);
        text-shadow: 0 0 80px rgba(233, 69, 96, 1), 0 0 160px rgba(233, 69, 96, 0.8), 0 0 240px rgba(233, 69, 96, 0.5);
        letter-spacing: 20px;
      }
      60% {
        opacity: 1;
        transform: translateY(5px) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        letter-spacing: 4px;
        text-shadow: 0 0 30px rgba(233, 69, 96, 0.6), 0 0 60px rgba(233, 69, 96, 0.3);
      }
    }

    @keyframes titleGlow {
      0% { text-shadow: 0 0 30px rgba(233, 69, 96, 0.6), 0 0 60px rgba(233, 69, 96, 0.3); }
      100% { text-shadow: 0 0 40px rgba(233, 69, 96, 0.8), 0 0 80px rgba(233, 69, 96, 0.5), 0 0 100px rgba(233, 69, 96, 0.2); }
    }

    .menu-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      max-width: 320px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .menu-btn {
      padding: 1.2rem 2rem;
      font-size: 1.3rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-decoration: none;
      display: inline-block;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
      animation: btnEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .menu-btn:nth-child(1) { animation-delay: 2.5s; }
    .menu-btn:nth-child(2) { animation-delay: 2.65s; }
    .menu-btn:nth-child(3) { animation-delay: 2.8s; }
    .menu-btn:nth-child(4) { animation-delay: 2.95s; }
    .menu-btn:nth-child(5) { animation-delay: 3.1s; }

    @keyframes btnEntry {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .menu-btn.primary {
      background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    .menu-btn.primary::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 40%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      transform: skewX(-20deg);
      animation: btnShimmer 4s ease-in-out infinite;
    }

    @keyframes btnShimmer {
      0%, 75%, 100% { left: -60%; }
      90% { left: 120%; }
    }

    .menu-btn.primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(233, 69, 96, 0.6);
    }

    .menu-btn.secondary {
      background: linear-gradient(135deg, rgba(15, 52, 96, 0.8) 0%, rgba(26, 26, 46, 0.9) 100%);
      color: white;
      border: 2px solid rgba(233, 69, 96, 0.6);
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.2);
      animation: btnEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                 neonBorder 4s ease-in-out infinite;
    }

    .menu-btn.secondary:nth-child(2) { animation-delay: 2.65s, 0s; }
    .menu-btn.secondary:nth-child(3) { animation-delay: 2.8s, 0.5s; }
    .menu-btn.secondary:nth-child(5) { animation-delay: 3.1s, 1s; }

    @keyframes neonBorder {
      0%, 100% { border-color: rgba(233, 69, 96, 0.6); box-shadow: 0 4px 15px rgba(233, 69, 96, 0.2); }
      33% { border-color: rgba(0, 255, 255, 0.6); box-shadow: 0 4px 15px rgba(0, 255, 255, 0.15); }
      66% { border-color: rgba(186, 85, 211, 0.6); box-shadow: 0 4px 15px rgba(186, 85, 211, 0.15); }
    }

    .menu-btn.secondary:hover {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.9) 0%, rgba(15, 52, 96, 0.8) 100%);
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(233, 69, 96, 0.4);
      border-color: rgba(233, 69, 96, 0.9);
    }

    .menu-btn.disabled {
      background: rgba(42, 42, 62, 0.6);
      color: #666;
      border: 2px solid #444;
      cursor: not-allowed;
    }

    .menu-btn.disabled:hover {
      transform: none;
      box-shadow: none;
    }

    .menu-btn .subtitle {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 4px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <canvas id="cyberCanvas"></canvas>

  <h1>HYPERGRID CHESS</h1>
  
  <div class="menu-container">
    <a href="chess.html?mode=ai" class="menu-btn primary">
      Chess
      <span class="subtitle">vs AI</span>
    </a>
    
    <a href="chess.html?mode=pvp" class="menu-btn secondary">
      Two Player
      <span class="subtitle">Local multiplayer</span>
    </a>
    
    <a href="chess.html?mode=puzzle" class="menu-btn secondary">
      Daily Puzzle
      <span class="subtitle">Train your tactics</span>
    </a>
    
    <div class="menu-btn disabled">
      Checkers
      <span class="subtitle">Coming soon</span>
    </div>
    
    <a href="about.html" class="menu-btn secondary">
      About
      <span class="subtitle">Learn more</span>
    </a>
  </div>

  <script>
  (function() {
    var canvas = document.getElementById('cyberCanvas');
    var ctx = canvas.getContext('2d');
    var W, H;
    var GRID = 60;
    var startTime = Date.now();

    var verts = [];
    var hEdges = [];
    var vEdges = [];

    function buildGrid() {
      var cols = Math.ceil(W / GRID) + 2;
      var rows = Math.ceil(H / GRID) + 2;
      var cx = W / 2;
      var cy = H / 2;
      var maxDist = Math.sqrt(cx * cx + cy * cy);

      verts = [];
      hEdges = [];
      vEdges = [];

      for (var r = 0; r <= rows; r++) {
        for (var c = 0; c <= cols; c++) {
          var x = c * GRID;
          var y = r * GRID;
          var dx = x - cx;
          var dy = y - cy;
          var dist = Math.sqrt(dx * dx + dy * dy);
          var norm = dist / maxDist;
          verts.push({ x: x, y: y, dist: norm, brightness: 0 });
        }
      }

      for (var r = 0; r <= rows; r++) {
        for (var c = 0; c < cols; c++) {
          var x1 = c * GRID;
          var x2 = (c + 1) * GRID;
          var y = r * GRID;
          var mx = (x1 + x2) / 2;
          var dist = Math.sqrt((mx - cx) * (mx - cx) + (y - cy) * (y - cy)) / maxDist;
          hEdges.push({ x1: x1, y: y, x2: x2, dist: dist, brightness: 0 });
        }
      }

      for (var c = 0; c <= cols; c++) {
        for (var r = 0; r < rows; r++) {
          var x = c * GRID;
          var y1 = r * GRID;
          var y2 = (r + 1) * GRID;
          var my = (y1 + y2) / 2;
          var dist = Math.sqrt((x - cx) * (x - cx) + (my - cy) * (my - cy)) / maxDist;
          vEdges.push({ x: x, y1: y1, y2: y2, dist: dist, brightness: 0 });
        }
      }
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      buildGrid();
    }
    resize();
    window.addEventListener('resize', resize);

    var twinkleIdx = Math.floor(Math.random() * verts.length);
    var nextTwinkle = 4000;

    var rings = [];
    var nextRing = 1500;

    function spawnRing() {
      var v = verts[Math.floor(Math.random() * verts.length)];
      rings.push({ x: v.x, y: v.y, t: 0, speed: 0.006 });
      nextRing = 1500 + Math.random() * 2500;
    }

    var GLYPH_SIZE = 40;
    var GLYPH_GAP = 55;
    var GLYPH_ARM = 22;
    var glyphFadeStart = 4000;

    function drawGlyph(cx, cy, angle, opacity) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      ctx.strokeStyle = 'rgba(0,255,255,' + opacity + ')';
      ctx.lineWidth = 1;

      ctx.beginPath();
      ctx.moveTo(-GLYPH_SIZE, -GLYPH_SIZE);
      ctx.lineTo(-GLYPH_SIZE, -GLYPH_SIZE + GLYPH_ARM);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(-GLYPH_SIZE, -GLYPH_SIZE);
      ctx.lineTo(-GLYPH_SIZE + GLYPH_ARM, -GLYPH_SIZE);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(GLYPH_SIZE, -GLYPH_SIZE);
      ctx.lineTo(GLYPH_SIZE, -GLYPH_SIZE + GLYPH_ARM);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(GLYPH_SIZE, -GLYPH_SIZE);
      ctx.lineTo(GLYPH_SIZE - GLYPH_ARM, -GLYPH_SIZE);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(-GLYPH_SIZE, GLYPH_SIZE);
      ctx.lineTo(-GLYPH_SIZE, GLYPH_SIZE - GLYPH_ARM);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(-GLYPH_SIZE, GLYPH_SIZE);
      ctx.lineTo(-GLYPH_SIZE + GLYPH_ARM, GLYPH_SIZE);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(GLYPH_SIZE, GLYPH_SIZE);
      ctx.lineTo(GLYPH_SIZE, GLYPH_SIZE - GLYPH_ARM);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(GLYPH_SIZE, GLYPH_SIZE);
      ctx.lineTo(GLYPH_SIZE - GLYPH_ARM, GLYPH_SIZE);
      ctx.stroke();

      ctx.restore();
    }

    function draw() {
      var elapsed = Date.now() - startTime;
      ctx.clearRect(0, 0, W, H);

      var DRAW_PHASE = 2500;
      var PULSE_START = 2500;
      var PULSE_DURATION = 600;
      var IDLE_START = PULSE_START + PULSE_DURATION;

      if (elapsed < DRAW_PHASE) {
        var progress = elapsed / DRAW_PHASE;
        var waveFront = progress * 1.3;

        for (var i = 0; i < hEdges.length; i++) {
          var e = hEdges[i];
          if (e.dist < waveFront) {
            var edgeProgress = Math.min((waveFront - e.dist) / 0.15, 1);
            e.brightness = edgeProgress * 0.8;
          }
        }
        for (var i = 0; i < vEdges.length; i++) {
          var e = vEdges[i];
          if (e.dist < waveFront) {
            var edgeProgress = Math.min((waveFront - e.dist) / 0.15, 1);
            e.brightness = edgeProgress * 0.8;
          }
        }
        for (var i = 0; i < verts.length; i++) {
          var v = verts[i];
          if (v.dist < waveFront) {
            v.brightness = Math.min((waveFront - v.dist) / 0.1, 1) * 1.0;
          }
        }
      } else if (elapsed < IDLE_START) {
        var pulseT = (elapsed - PULSE_START) / PULSE_DURATION;
        var pulseRadius = pulseT * 1.4;
        var pulseBright = (1 - pulseT) * 1.0;

        for (var i = 0; i < hEdges.length; i++) {
          var e = hEdges[i];
          var d = Math.abs(e.dist - pulseRadius);
          var boost = d < 0.15 ? (1 - d / 0.15) * pulseBright : 0;
          e.brightness = 0.8 + boost;
        }
        for (var i = 0; i < vEdges.length; i++) {
          var e = vEdges[i];
          var d = Math.abs(e.dist - pulseRadius);
          var boost = d < 0.15 ? (1 - d / 0.15) * pulseBright : 0;
          e.brightness = 0.8 + boost;
        }
        for (var i = 0; i < verts.length; i++) {
          var v = verts[i];
          var d = Math.abs(v.dist - pulseRadius);
          var boost = d < 0.15 ? (1 - d / 0.15) * pulseBright : 0;
          v.brightness = 1.0 + boost * 0.5;
        }
      } else {
        var settleT = Math.min((elapsed - IDLE_START) / 1500, 1);
        var idleBase = 0.15 * settleT;

        nextTwinkle -= 16;
        if (nextTwinkle <= 0) {
          twinkleIdx = Math.floor(Math.random() * verts.length);
          nextTwinkle = 800 + Math.random() * 2000;
        }

        for (var i = 0; i < hEdges.length; i++) {
          hEdges[i].brightness = idleBase;
        }
        for (var i = 0; i < vEdges.length; i++) {
          vEdges[i].brightness = idleBase;
        }
        for (var i = 0; i < verts.length; i++) {
          verts[i].brightness = idleBase * 1.5;
        }

        var twinkle = verts[twinkleIdx];
        if (twinkle) {
          var twinkleLife = nextTwinkle / (800 + 2000);
          var twinklePeak = Math.sin(twinkleLife * Math.PI) * 1.0;
          twinkle.brightness = idleBase * 1.5 + twinklePeak;
        }

        if (rings.length < 2) {
          nextRing -= 16;
          if (nextRing <= 0) spawnRing();
        }
      }

      ctx.lineWidth = 1.5;
      for (var i = 0; i < hEdges.length; i++) {
        var e = hEdges[i];
        if (e.brightness < 0.005) continue;
        ctx.strokeStyle = 'rgba(0,255,255,' + e.brightness + ')';
        ctx.beginPath();
        ctx.moveTo(e.x1, e.y);
        ctx.lineTo(e.x2, e.y);
        ctx.stroke();
      }
      for (var i = 0; i < vEdges.length; i++) {
        var e = vEdges[i];
        if (e.brightness < 0.005) continue;
        ctx.strokeStyle = 'rgba(0,255,255,' + e.brightness + ')';
        ctx.beginPath();
        ctx.moveTo(e.x, e.y1);
        ctx.lineTo(e.x, e.y2);
        ctx.stroke();
      }

      for (var i = 0; i < verts.length; i++) {
        var v = verts[i];
        if (v.brightness < 0.01) continue;
        ctx.fillStyle = 'rgba(0,255,255,' + v.brightness + ')';
        ctx.beginPath();
        ctx.arc(v.x, v.y, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }

      for (var i = rings.length - 1; i >= 0; i--) {
        var rn = rings[i];
        rn.t += rn.speed;
        if (rn.t >= 1) { rings.splice(i, 1); continue; }

        var radius = 2 + rn.t * 50;
        var alpha = (1 - rn.t) * 0.8;

        ctx.strokeStyle = 'rgba(0,255,255,' + alpha + ')';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(rn.x, rn.y, radius, 0, Math.PI * 2);
        ctx.stroke();

        if (radius > 10) {
          ctx.strokeStyle = 'rgba(0,255,255,' + (alpha * 0.4) + ')';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(rn.x, rn.y, radius * 0.6, 0, Math.PI * 2);
          ctx.stroke();
        }

        var ringGlow = ctx.createRadialGradient(rn.x, rn.y, radius * 0.5, rn.x, rn.y, radius + 15);
        ringGlow.addColorStop(0, 'rgba(0,255,255,0)');
        ringGlow.addColorStop(0.7, 'rgba(0,255,255,' + (alpha * 0.2) + ')');
        ringGlow.addColorStop(1, 'rgba(0,255,255,0)');
        ctx.fillStyle = ringGlow;
        ctx.beginPath();
        ctx.arc(rn.x, rn.y, radius + 15, 0, Math.PI * 2);
        ctx.fill();
      }

      if (elapsed > glyphFadeStart) {
        var glyphAge = elapsed - glyphFadeStart;
        var glyphAlpha = Math.min(glyphAge / 2000, 1) * (0.6 + 0.25 * Math.sin(elapsed / 4000));
        var glyphAngle = (elapsed / 30000) * Math.PI * 2;

        drawGlyph(GLYPH_GAP, GLYPH_GAP, glyphAngle, glyphAlpha);
        drawGlyph(W - GLYPH_GAP, GLYPH_GAP, glyphAngle, glyphAlpha);
        drawGlyph(GLYPH_GAP, H - GLYPH_GAP, glyphAngle, glyphAlpha);
        drawGlyph(W - GLYPH_GAP, H - GLYPH_GAP, glyphAngle, glyphAlpha);
      }

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  })();
  </script>
</body>
</html>
