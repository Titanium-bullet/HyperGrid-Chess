<!DOCTYPE html>
<html>
<head>
    <title>HYPERGRID CHESS</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { 
            font-family: 'Arial Black', Arial, sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #0c0c0c, #1a1a2e); 
            color: #fff; 
            margin: 0; 
            padding: 20px;
        }
        h1 { 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-size: 2.5em; 
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
        }
        #myBoard { 
            margin: 20px auto; 
            border: 5px solid;
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            width: 500px;
        }
        /* Dynamic theme glows */
        #myBoard.theme-white { --glow-rgb: 0, 255, 255; }
        #myBoard.theme-black { --glow-rgb: 186, 85, 211; }
        #myBoard.theme-check { --glow-rgb: 255, 50, 50; }
        #myBoard.theme-gameover { --glow-rgb: 255, 215, 0; }
        /* Base glow (always on, color by theme) */
        #myBoard:not(.flash-red) {
            box-shadow: 
                0 0 20px rgba(var(--glow-rgb), 0.6),
                0 0 40px rgba(var(--glow-rgb), 0.4),
                0 20px 40px rgba(var(--glow-rgb), 0.3),
                inset 0 0 40px rgba(255, 255, 255, 0.15);
            border-color: rgba(var(--glow-rgb), 0.7);
        }
        /* Enhanced hover glow */
        #myBoard:hover:not(.flash-red) {
            box-shadow: 
                0 0 30px rgba(var(--glow-rgb), 0.8),
                0 0 60px rgba(var(--glow-rgb), 0.6),
                0 30px 60px rgba(var(--glow-rgb), 0.45),
                inset 0 0 60px rgba(255, 255, 255, 0.25);
        }
        /* Flash red for illegal */
        #myBoard.flash-red {
            box-shadow: 
                0 0 40px rgba(255, 0, 0, 0.9),
                0 0 80px rgba(255, 0, 0, 0.7),
                0 40px 80px rgba(255, 0, 0, 0.5),
                inset 0 0 80px rgba(255, 50, 50, 0.4);
            border-color: rgba(255, 0, 0, 0.9);
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            transform: translateX(0);
        }
        @keyframes shake {
            10%, 90% { transform: translateX(-5px); }
            20%, 80% { transform: translateX(5px); }
            30%, 50%, 70% { transform: translateX(-3px); }
        }
      
        #myBoard .white-1e1d7 { 
            background: linear-gradient(145deg, #1a1a2e, #16213e); 
            transition: all 0.3s;
        }
        #myBoard .black-3c85d { 
            background: linear-gradient(145deg, #0f3460, #533483); 
            transition: all 0.3s;
        }
        #myBoard .square-55d63 { 
            box-shadow: inset 0 0 20px rgba(255,255,255,0.2); 
        }
        #myBoard .highlight1-32417, #myBoard .highlight2-9c5d2 { 
            box-shadow: inset 0 0 30px rgba(0,255,0,0.8), 0 0 20px rgba(0,255,0,0.6); 
        }

        #myBoard img {
            filter: drop-shadow(0 4px 12px rgba(255,255,255,0.4)) brightness(1.05);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        #myBoard img[src*="w"] {
            filter: drop-shadow(0 4px 12px rgba(255,255,255,0.4))
                    drop-shadow(0 0 8px rgba(0, 200, 255, 0.3))
                    drop-shadow(0 0 4px rgba(0, 200, 255, 0.2))
                    brightness(1.05);
        }
        #myBoard img[src*="b"] {
            filter: drop-shadow(0 4px 12px rgba(255,255,255,0.4))
                    drop-shadow(0 0 8px rgba(186, 85, 211, 0.3))
                    drop-shadow(0 0 4px rgba(186, 85, 211, 0.2))
                    brightness(1.05);
        }

        #myBoard.theme-white img[src*="w"] {
            filter: drop-shadow(0 4px 12px rgba(255,255,255,0.5))
                    drop-shadow(0 0 16px rgba(0, 255, 255, 0.6))
                    drop-shadow(0 0 32px rgba(0, 255, 255, 0.4))
                    brightness(1.12);
        }
        #myBoard.theme-black img[src*="b"] {
            filter: drop-shadow(0 4px 12px rgba(255,255,255,0.5))
                    drop-shadow(0 0 16px rgba(186, 85, 211, 0.6))
                    drop-shadow(0 0 32px rgba(186, 85, 211, 0.4))
                    brightness(1.12);
        }
        #myBoard img:hover {
            transform: scale(1.08);
        }
        #status { 
            font-size: 28px; 
            margin: 20px; 
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        button { 
            padding: 15px 30px; 
            font-size: 20px; 
            margin: 10px; 
            cursor: pointer; 
            background: linear-gradient(45deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
            transition: all 0.3s;
        }
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(102,126,234,0.6); 
        }
        .controls { margin: 20px; }
        @media (max-width: 600px) { #myBoard { width: 90vw !important; } }
    </style>
</head>
<body>
    <h1>🌌 2 Players HYPERGRID CHESS ♟️</h1>
    <p>Drag pixels to conquer! Glows match your turn. Hover for max glow! Illegal moves shake & flash red.</p>
    <div id="myBoard"></div>
    <div id="status"></div>
    <div class="controls">
        <button onclick="resetGame()">🔄 New Game</button>
        <button onclick="flipBoard()">🔄 Flip Board</button>
    </div>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var boardEl = document.getElementById('myBoard');


        function getPieceTheme(piece) {
            return `https://lichess1.org/assets/piece/pixel/${piece}.svg`;
        }

        var config = {
            draggable: true,
            position: 'start',
            pieceTheme: getPieceTheme,
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };

        function onDragStart(source, piece) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
        }

        function onDrop(source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) {

                boardEl.classList.add('flash-red');
                setTimeout(() => {
                    boardEl.classList.remove('flash-red');
                }, 500);
                return 'snapback';
            }
            updateStatus();
            updateTheme();
        }

        function onSnapEnd() {
            board.position(game.fen());
            updateTheme(); 
        }

        board = Chessboard('myBoard', config);
        updateStatus();
        updateTheme(); 

        function updateStatus() {
            var status = '';
            var moveColor = (game.turn() === 'w') ? 'White' : 'Black';
            if (game.in_checkmate()) {
                status = `💥 Game Over! ${moveColor} checkmated! Opponent wins!`;
            } else if (game.in_draw()) {
                status = '🤝 Game Over! Draw!';
            } else {
                status = `${moveColor}'s turn`;
                if (game.in_check()) status += ` ⚠️ in check!`;
            }
            $status.html(status);
        }

        function updateTheme() {
            boardEl.classList.remove('theme-white', 'theme-black', 'theme-check', 'theme-gameover');
            if (game.game_over()) {
                boardEl.classList.add('theme-gameover');
            } else if (game.in_check()) {
                boardEl.classList.add('theme-check');
            } else if (game.turn() === 'w') {
                boardEl.classList.add('theme-white');
            } else {
                boardEl.classList.add('theme-black');
            }
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
            updateTheme();
        }

        function flipBoard() {
            board.flip();
        }
    </script>
</body>
</html>
