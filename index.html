<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperGrid Chess</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a14;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      position: relative;
      overflow: hidden;
    }

    #cyberCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.5) 100%);
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: vignetteFadeIn 1s ease 3s forwards;
    }

    @keyframes vignetteFadeIn {
      to { opacity: 1; }
    }

    h1 {
      color: #e94560;
      font-size: 3.5rem;
      margin-bottom: 3rem;
      text-shadow: 0 0 30px rgba(233, 69, 96, 0.6), 0 0 60px rgba(233, 69, 96, 0.3);
      letter-spacing: 4px;
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: titleEntry 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.5s forwards,
                 titleGlow 3s ease-in-out 2.7s infinite alternate;
    }

    @keyframes titleEntry {
      0% {
        opacity: 0; 
        transform: translateY(-40px) scale(0.8);
        text-shadow: 0 0 80px rgba(233, 69, 96, 1), 0 0 160px rgba(233, 69, 96, 0.8), 0 0 240px rgba(233, 69, 96, 0.5);
        letter-spacing: 20px;
      }
      60% {
        opacity: 1;
        transform: translateY(5px) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        letter-spacing: 4px;
        text-shadow: 0 0 30px rgba(233, 69, 96, 0.6), 0 0 60px rgba(233, 69, 96, 0.3);
      }
    }

    @keyframes titleGlow {
      0% { text-shadow: 0 0 30px rgba(233, 69, 96, 0.6), 0 0 60px rgba(233, 69, 96, 0.3); }
      100% { text-shadow: 0 0 40px rgba(233, 69, 96, 0.8), 0 0 80px rgba(233, 69, 96, 0.5), 0 0 100px rgba(233, 69, 96, 0.2); }
    }

    .menu-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      max-width: 320px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .menu-btn {
      padding: 1.2rem 2rem;
      font-size: 1.3rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-decoration: none;
      display: inline-block;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
      animation: btnEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .menu-btn:nth-child(1) { animation-delay: 2.5s; }
    .menu-btn:nth-child(2) { animation-delay: 2.65s; }
    .menu-btn:nth-child(3) { animation-delay: 2.8s; }
    .menu-btn:nth-child(4) { animation-delay: 2.95s; }

    @keyframes btnEntry {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .menu-btn.primary {
      background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    .menu-btn.primary::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 40%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      transform: skewX(-20deg);
      animation: btnShimmer 4s ease-in-out infinite;
    }

    @keyframes btnShimmer {
      0%, 75%, 100% { left: -60%; }
      90% { left: 120%; }
    }

    .menu-btn.primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(233, 69, 96, 0.6);
    }

    .menu-btn.secondary {
      background: linear-gradient(135deg, rgba(15, 52, 96, 0.8) 0%, rgba(26, 26, 46, 0.9) 100%);
      color: white;
      border: 2px solid rgba(233, 69, 96, 0.6);
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.2);
      animation: btnEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                 neonBorder 4s ease-in-out infinite;
    }

    .menu-btn.secondary:nth-child(4) { animation-delay: 2.95s, 0s; }

    @keyframes neonBorder {
      0%, 100% { border-color: rgba(233, 69, 96, 0.6); box-shadow: 0 4px 15px rgba(233, 69, 96, 0.2); }
      33% { border-color: rgba(0, 255, 255, 0.6); box-shadow: 0 4px 15px rgba(0, 255, 255, 0.15); }
      66% { border-color: rgba(186, 85, 211, 0.6); box-shadow: 0 4px 15px rgba(186, 85, 211, 0.15); }
    }

    .menu-btn.secondary:hover {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.9) 0%, rgba(15, 52, 96, 0.8) 100%);
      transform: translateY(-3px);
      box-shadow: 0 6px 25px rgba(233, 69, 96, 0.4);
      border-color: rgba(233, 69, 96, 0.9);
    }

    .menu-btn.disabled {
      background: rgba(42, 42, 62, 0.6);
      color: #666;
      border: 2px solid #444;
      cursor: not-allowed;
    }

    .menu-btn.disabled:hover {
      transform: none;
      box-shadow: none;
    }

    .menu-btn .subtitle {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .shop-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 25px;
      color: #ffd700;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s;
      opacity: 0;
      animation: fadeIn 0.8s ease 2.5s forwards;
    }

    .shop-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,215,0,0.2);
      border-color: rgba(255,215,0,0.8);
      box-shadow: 0 4px 15px rgba(255,215,0,0.3);
    }

    .shop-btn .shop-icon { font-size: 1.2rem; }

    .shop-btn .coin-count {
      font-weight: 700;
    }

    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>
  <canvas id="cyberCanvas"></canvas>

  <h1>HYPERGRID CHESS</h1>

  <a href="shop.html" class="shop-btn">
    <span class="shop-icon">&#x1F6D2;</span>
    <span class="coin-count" id="menuCoins">0</span>
  </a>
  
  <div class="menu-container">
    <a href="play.html" class="menu-btn primary">
      Chess
      <span class="subtitle">Play now</span>
    </a>
    
    <a class="menu-btn secondary" onclick="testAchievements()" style="cursor:pointer">
      Test Achievements
      <span class="subtitle">Bronze &rarr; Silver &rarr; Gold</span>
    </a>
    
    <div class="menu-btn disabled">
      Gomoku
      <span class="subtitle">Coming soon</span>
    </div>
    
    <a href="about.html" class="menu-btn secondary">
      Explore More
      <span class="subtitle">Discover more features</span>
    </a>
  </div>

  <script src="shop.js"></script>
  <script src="achievements.js"></script>
  <script src="background.js"></script>
  <script>
    (function () {
      var coinEl = document.getElementById('menuCoins');
      if (coinEl && typeof ShopSystem !== 'undefined') {
        coinEl.textContent = ShopSystem.getCoins();
      }
    })();

    function testAchievements() {
      AchievementTracker.showToast('First Blood', 'Bronze', '\u2694');
      setTimeout(function() {
        AchievementTracker.showToast('Nova Slayer', 'Silver', '\uD83C\uDF1F');
      }, 1200);
      setTimeout(function() {
        AchievementTracker.showToast('HyperGrid Slayer', 'Gold', '\uD83D\uDD25');
      }, 2400);
    }
  </script>
</body>
</html>
